name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Permet de déclencher manuellement depuis l'onglet Actions.
  workflow_dispatch:

# Annule les runs en cours sur la même branche dès qu'un nouveau commit
# arrive — évite de payer pour des builds obsolètes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Backend Python : pytest sur tout le repo.
  # -------------------------------------------------------------------------
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Test-only deps (httpx pour FastAPI TestClient, pytest pour le runner).
          pip install pytest httpx

      - name: Run pytest
        env:
          SIA_ENV: development
        run: pytest tests/ -q --tb=short

  # -------------------------------------------------------------------------
  # Frontend TypeScript : typecheck strict via tsc.
  # -------------------------------------------------------------------------
  frontend:
    name: Frontend (typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Production build
        run: npm run build

  # -------------------------------------------------------------------------
  # Build de l'image Docker — confirme que le Dockerfile est valide et que
  # le binaire fonctionne en cold start. Ne push pas vers un registry par
  # défaut ; ajoutez `docker/login-action` + `tags:` si vous voulez pusher.
  # -------------------------------------------------------------------------
  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Dépend des deux jobs précédents : ne perdre pas de temps à builder
    # l'image si le code ne compile pas / ne passe pas les tests.
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: sia-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          # Vérifie que l'image démarre l'API et répond bien sur /health.
          # Mongo/Qdrant ne sont pas joignables ici donc on accepte aussi
          # bien un 200 qu'un 503 — l'important est que l'application boot.
          docker run -d --name sia_ci -p 8000:8000 \
            -e SIA_ENV=development \
            -e SIA_OTP_ENABLED=false \
            sia-backend:ci
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/ \
                | grep -E "^(200|503)$" >/dev/null; then
              echo "Backend responded after ${i}s"
              docker logs sia_ci | tail -20
              docker rm -f sia_ci
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not respond within 30s — dumping logs"
          docker logs sia_ci || true
          docker rm -f sia_ci
          exit 1
