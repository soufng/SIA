name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  # Permet de déclencher manuellement depuis l'onglet Actions.
  workflow_dispatch:

# Annule les runs en cours sur la même branche dès qu'un nouveau commit
# arrive — évite de payer pour des builds obsolètes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Permissions par défaut minimales ; le job ``docker`` les surcharge
# pour pouvoir pusher l'image vers GHCR.
permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # Backend Python : pytest sur tout le repo.
  # -------------------------------------------------------------------------
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Test-only deps (httpx pour FastAPI TestClient, pytest pour le runner).
          pip install pytest httpx

      - name: Run pytest
        env:
          SIA_ENV: development
        run: pytest tests/ -q --tb=short

  # -------------------------------------------------------------------------
  # Frontend TypeScript : typecheck strict via tsc.
  # -------------------------------------------------------------------------
  frontend:
    name: Frontend (typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Production build
        run: npm run build

  # -------------------------------------------------------------------------
  # Build de l'image Docker — confirme que le Dockerfile est valide et que
  # le binaire fonctionne en cold start. Sur un ``push`` vers main ou dev
  # (mais pas sur une PR, où les secrets seraient absents), l'image est
  # poussée vers GitHub Container Registry après validation du smoke test.
  # -------------------------------------------------------------------------
  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Dépend des deux jobs précédents : ne perdre pas de temps à builder
    # l'image si le code ne compile pas / ne passe pas les tests.
    needs: [backend, frontend]
    # Le ``contents`` read par défaut ne suffit pas pour pusher vers GHCR.
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/sia-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (local load pour le smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: sia-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          # Vérifie que l'image démarre l'API et répond bien sur /.
          # Mongo/Qdrant ne sont pas joignables ici donc on accepte aussi
          # bien un 200 qu'un 503 — l'important est que l'application boot.
          docker run -d --name sia_ci -p 8000:8000 \
            -e SIA_ENV=development \
            -e SIA_OTP_ENABLED=false \
            sia-backend:ci
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/ \
                | grep -E "^(200|503)$" >/dev/null; then
              echo "Backend responded after ${i}s"
              docker logs sia_ci | tail -20
              docker rm -f sia_ci
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not respond within 30s — dumping logs"
          docker logs sia_ci || true
          docker rm -f sia_ci
          exit 1

      # ---------- CD : push vers GitHub Container Registry ----------
      # Saute proprement les PR (pas de secret disponible pour les forks)
      # et les déclenchements manuels qui ne ciblent pas une branche
      # protégée.
      - name: Log in to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        id: tags
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # Pour ``main``  → tags ``main``, ``sha-<short>``, ``latest``.
          # Pour ``dev``   → tags ``dev``,  ``sha-<short>``.
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Push image to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}
          # Le build a déjà eu lieu plus haut ; le cache GHA évite de
          # recompiler.
          cache-from: type=gha
          cache-to: type=gha,mode=max
