# Config nginx pour servir le SPA SIA en local.
# Le SPA gère son routing côté client : toute URL inconnue retombe sur
# index.html. Les requêtes API partent vers http://localhost:8000 depuis
# le browser (cf. frontend/src/lib/api.ts).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cache long sur les assets versionnés (Vite ajoute des hash).
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fallback SPA : tout ce qui n'est pas un fichier réel renvoie index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
