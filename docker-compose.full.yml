# SIA — déploiement Docker (backend + frontend)
#
# Mongo et Qdrant tournent déjà en standalone (containers ``sia_mongodb`` et
# ``sia_qdrant``) — ce compose ne les recrée pas pour préserver les données.
# Le backend les joint via ``host.docker.internal`` puisque leurs ports
# (27017 / 6333) sont publiés sur l'host.
#
# Démarrage :
#   docker compose -f docker-compose.full.yml up --build -d
#
# Accès :
#   - Frontend : http://localhost:8080
#   - API      : http://localhost:8000  (docs sur /docs)
#
# Pré-requis :
#   - frontend/dist/ doit exister (déjà présent). Sinon :
#       cd frontend && npm ci && npm run build
#   - Containers ``sia_mongodb`` et ``sia_qdrant`` up
#     (renommés depuis ``spm_*``).
#   - Ollama tourne sur l'host (``ollama serve`` + modèle pull).

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: sia-backend:local
    container_name: sia_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SIA_ENV: development
      # Mongo : même logique que Qdrant — DNS interne du réseau ``db_default``.
      # Ollama reste sur ``host.docker.internal`` car il tourne sur l'host Windows,
      # pas dans un container.
      MONGODB_URL: mongodb://mongodb:27017/sia
      MONGO_DB_NAME: sia
      # Qdrant : on rejoint le réseau ``db_default`` (cf. bas du fichier)
      # pour parler au container ``db_qdrant`` directement via son DNS
      # interne. Plus stable que ``host.docker.internal`` sous Docker
      # Desktop Windows, qui flippe sous charge et provoque des
      # ``[Errno 111] Connection refused`` en plein milieu d'analyse.
      SIA_QDRANT_URL: http://qdrant
      SIA_QDRANT_PORT: "6333"
      SIA_RAG_LLM_BASE_URL: http://host.docker.internal:11434
      SIA_OTP_ENABLED: "true"
      # Secret TOTP de dev local. Régénérer avec
      # ``docker exec sia_backend python -m backend.core.totp generate``
      # et changer en prod (sinon le 2FA est silencieusement désactivé).
      SIA_OTP_SECRET: "JQWGX2WFTSXOQOHVNZGDHIW2CD3OOXO2"
      SIA_AUTH_ENABLED: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - db
    volumes:
      # Cache HuggingFace persistant — évite de re-télécharger e5-base
      # (~430 MB) à chaque rebuild.
      - hf_cache:/root/.cache/huggingface

  frontend:
    image: nginx:1-alpine
    container_name: sia_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx-spa.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

networks:
  default:
  # Réseau créé par ``docker-compose.db.yml`` (nom Docker : ``db_default``)
  # où tournent ``db_qdrant`` et ``db_mongodb``. ``external: true``
  # signifie : on rejoint un réseau existant, on ne le recrée pas.
  db:
    external: true
    name: db_default

volumes:
  hf_cache:
